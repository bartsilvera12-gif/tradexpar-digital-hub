# =============================================================================
# Tradexpar — Nginx (producción, sitio de alto tráfico)
# Sirve estáticos del SPA (Vite/React) directo desde disco y proxea solo /api,
# /health y /fastrax-products al Node de pagos (PM2/Docker en :8787).
#
# Notas críticas para evitar 504 / cuellos de botella:
#   1) NUNCA proxear "/" entero al Node: el SPA debe servirse como archivo estático.
#      Si Node se cae o se traba, la app sigue cargando en el navegador.
#   2) gzip on para text/javascript, application/json, text/css, etc.
#      (alternativa moderna: brotli si está compilado).
#   3) Cachear assets con hash (`/assets/*.{js,css,woff2,…}`) por 1 año, immutable.
#   4) `proxy_read_timeout` razonable (60-90s) para no quedar pegado con upstream lento.
#   5) `proxy_buffers` agrandados ayudan a respuestas JSON grandes (listado de pedidos).
#   6) `keepalive` hacia upstream para reusar conexiones TCP a Node.
#
# Comprobaciones rápidas tras `nginx -t && systemctl reload nginx`:
#   curl -sS https://TU_DOMINIO/health
#   curl -sS -o /dev/null -w "%{http_code}\n" https://TU_DOMINIO/admin/orders
#   curl -sS -H "Accept-Encoding: gzip" -I https://TU_DOMINIO/api/health  # ver Content-Encoding
# =============================================================================

# Upstream con keepalive: evita reabrir TCP por cada request a Node.
upstream tradexpar_node {
    server 127.0.0.1:8787;
    keepalive 32;
    keepalive_timeout 65s;
    keepalive_requests 1000;
}

# Limita 30 req/s por IP a /api/* (ráfagas pequeñas; admin admin pasa libre).
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;

server {
    listen 443 ssl http2;
    server_name tradexpar.com.py www.tradexpar.com.py;

    # ssl_certificate     /etc/letsencrypt/live/tradexpar.com.py/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tradexpar.com.py/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;

    root /var/www/tradexpar/dist;
    index index.html;

    # ---------- Compresión ---------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ---------- Performance globales ----------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 30s;
    reset_timedout_connection on;

    # ---------- Assets con hash: cache larga ---------------------------------
    location ~* ^/assets/.+\.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|avif|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
        access_log off;
    }

    # ---------- Imágenes públicas Tradexpar (storage local) ------------------
    location ~* ^/(images|fonts)/.+ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
        access_log off;
    }

    # ---------- Imágenes Fastrax importadas (las sirve Node con max-age=7d) --
    location /fastrax-products/ {
        proxy_pass http://tradexpar_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        # Cache pública 1 día en Nginx (las imágenes solo cambian al re-importar).
        proxy_cache_valid 200 1d;
        access_log off;
    }

    # ---------- Health check rápido ------------------------------------------
    location = /health {
        proxy_pass http://tradexpar_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 5s;
        proxy_connect_timeout 2s;
        access_log off;
    }

    # ---------- API Node de pagos / admin ------------------------------------
    location /api/ {
        limit_req zone=api_zone burst=60 nodelay;
        proxy_pass http://tradexpar_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tiempos: Node responde 99% < 1s; ope=12 Fastrax puede llegar a 30s.
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
        # CORS opcional: si Express ya lo maneja (cors middleware), no duplicar acá.
        # add_header Access-Control-Allow-Origin $http_origin always;
        # add_header Access-Control-Allow-Credentials true always;
        # add_header Access-Control-Allow-Headers "authorization,content-type,x-api-key" always;
        # add_header Access-Control-Allow-Methods "GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS" always;
    }

    # ---------- index.html (SPA): no cachear ---------------------------------
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-store, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ---------- SPA fallback -------------------------------------------------
    # Cualquier ruta que no exista en disco devuelve index.html (React Router maneja la URL).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # ---------- Errores ------------------------------------------------------
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/tradexpar/dist;
        internal;
    }
}

# Redirección HTTP → HTTPS
server {
    listen 80;
    server_name tradexpar.com.py www.tradexpar.com.py;
    return 301 https://$host$request_uri;
}
